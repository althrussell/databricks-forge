name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "WHY_FORGE.md"
      - "QUICKSTART.md"
      - "ASK_FORGE.md"
      - "ESTATE_ANALYSIS.md"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-docs.txt

      - run: mkdocs gh-deploy --force
